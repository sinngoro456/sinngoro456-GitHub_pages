name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Create static Pages entrypoint
        shell: bash
        run: |
          set -euo pipefail

          js_file=$(find dist/client/assets -maxdepth 1 -name 'index-*.js' | head -n 1)
          css_file=$(find dist/client/assets -maxdepth 1 -name 'styles-*.css' | head -n 1)

          if [ -z "${js_file:-}" ] || [ -z "${css_file:-}" ]; then
            echo "Expected built client asset files were not found."
            exit 1
          fi

          js_file=${js_file#dist/client/}
          css_file=${css_file#dist/client/}

          cat > dist/client/index.html <<EOF
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>TanStack Start Starter</title>
              <link rel="stylesheet" href="./${css_file}" />
              <script type="module" src="./${js_file}"></script>
            </head>
            <body>
              <div id="app"></div>
            </body>
          </html>
          EOF

          cp dist/client/index.html dist/client/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4